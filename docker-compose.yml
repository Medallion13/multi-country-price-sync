services:
  # DB
  postgres:
    image: postgres:16
    container_name: "pricesync-postgres"
    restart: "unless-stopped"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
  # Prefect server - API + UI
  prefect-server:
    build:
      context: .
      dockerfile: docker/prefect-base.Dockerfile
    image: pricesync/prefect-base:latest
    container_name: pricesync-prefect-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PREFECT_HOME: /data/prefect
      PREFECT_SERVER_API_HOST: 0.0.0.0
      PREFECT_SERVER_API_PORT: "4200"
      # Browser UI calls back to /api on the same host:port.
      PREFECT_API_URL: http://localhost:4200/api
      # Prefect server uses asyncpg to talk to Postgres.
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      POSTGRES_HOST: postgres
      PREFECT_RESULTS_PERSIST_BY_DEFAULT: "true"
    volumes:
      - prefect_data:/data/prefect
    ports:
      - "4200:4200"
    command: ["prefect", "server", "start", "--host", "0.0.0.0"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:4200/api/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  mock-woocommerce:
    build:
      context: .
      dockerfile: docker/mock-woocommerce.Dockerfile
    container_name: mock-woocommerce
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3

  prefect-worker-light:
    build:
      context: .
      dockerfile: docker/prefect-base.Dockerfile
    container_name: prefect-worker-light
    depends_on:
      prefect-server:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      PREFECT_API_URL: http://prefect-server:4200/api
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      FX_API_BASE: ${FX_API_BASE}
      MOCK_WOOCOMMERCE_BASE: http://mock-woocommerce:8000
      DRIFT_THRESHOLD_PCT: ${DRIFT_THRESHOLD_PCT:-5.0}
      HTTP_TIMEOUT_S: ${HTTP_TIMEOUT_S:-10.0}
      PYTHONPATH: /app
      PREFECT_RESULTS_PERSIST_BY_DEFAULT: "true"
    volumes:
      - ./src:/app/src
      - ./pyproject.toml:/app/pyproject.toml:ro
      - ./uv.lock:/app/uv.lock:ro
    working_dir: /app
    command: prefect worker start --pool light-pool --name worker-light --type process
    restart: unless-stopped

volumes:
  postgres_data:
  prefect_data:
